<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário do Personagem</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/mestre-theme.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
        }

        .topo-admin {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
        }

        .menu-admin {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-items: center;
        }

        .conteudo {
            max-width: 1360px;
            margin: 0 auto;
            padding: 28px 24px 40px;
        }

        .topo-tela {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 22px;
        }

        .titulo-pagina {
            margin: 0;
            font-size: 2.15rem;
            line-height: 1.1;
        }

        .botao-padrao {
            background: rgba(255, 255, 255, 0.04);
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 16px;
            padding: 14px 22px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        }

        .botao-padrao:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.16);
        }

        .busca {
            width: 100%;
            margin-bottom: 18px;
            padding: 16px 18px;
            border-radius: 18px;
            border: 1px solid rgba(93, 125, 179, 0.28);
            outline: none;
            background: rgba(8, 18, 35, 0.65);
            color: #f3f6fb;
            font-size: 1rem;
            box-shadow: inset 0 0 0 1px rgba(80, 110, 160, 0.14);
        }

        .busca::placeholder {
            color: rgba(219, 230, 246, 0.6);
        }

        .lista {
            border-radius: 24px;
            padding: 24px 24px 18px;
            background: linear-gradient(180deg, rgba(22, 42, 74, 0.96), rgba(14, 29, 53, 0.96));
            border: 1px solid rgba(84, 118, 174, 0.24);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
        }

        .secao-inventario {
            margin-bottom: 24px;
        }

        .secao-inventario:last-child {
            margin-bottom: 0;
        }

        .titulo-secao {
            margin: 0 0 12px;
            font-size: 1.55rem;
            font-weight: 800;
            color: #f6f8fc;
        }

        .grupo-linhas {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .linha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            padding: 16px 18px;
            border-radius: 18px;
            background: linear-gradient(90deg, rgba(32, 53, 87, 0.9), rgba(37, 56, 87, 0.72));
            border: 1px solid rgba(97, 129, 183, 0.18);
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .info-nome {
            font-size: 1.18rem;
            font-weight: 700;
            color: #f6f8fc;
            line-height: 1.2;
            word-break: break-word;
        }

        .info-detalhe {
            font-size: 0.98rem;
            color: rgba(226, 234, 246, 0.72);
            line-height: 1.25;
            word-break: break-word;
        }

        .botao-remover {
            border: 1px solid rgba(196, 97, 97, 0.35);
            background: linear-gradient(180deg, rgba(86, 55, 73, 0.9), rgba(70, 46, 60, 0.9));
            color: #fff3f3;
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 0.98rem;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .botao-remover:hover {
            transform: translateY(-2px);
            border-color: rgba(226, 126, 126, 0.48);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.16);
        }

        .vazio {
            text-align: center;
            padding: 28px 16px;
            color: rgba(228, 236, 247, 0.76);
            font-size: 1rem;
        }

        @media (max-width: 900px) {
            .topo-admin {
                flex-direction: column;
                align-items: flex-start;
                gap: 14px;
            }

            .menu-admin {
                justify-content: flex-start;
            }

            .topo-tela {
                flex-direction: column;
                align-items: flex-start;
            }

            .titulo-pagina {
                font-size: 1.9rem;
            }

            .linha {
                flex-direction: column;
                align-items: stretch;
            }

            .botao-remover,
            .botao-padrao {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <header class="topo-admin">
        <div>Painel do Mestre</div>
        <nav class="menu-admin">
            <a href="dashboard-mestre.html">Dashboard</a>
            <a href="personagens.html">Personagens</a>
            <a href="biblioteca.html">Biblioteca</a>
            <a href="loja-mestre.html">Loja</a>
            <a href="efeitos.html">Efeitos</a>
            <a href="combate.html">Combate</a>
        </nav>
    </header>

    <div class="conteudo">

        <div class="topo-tela">
            <h1 class="titulo-pagina">Inventário do Personagem</h1>
            <button class="botao-padrao" onclick="voltarFicha()">Voltar para ficha</button>
        </div>

        <input type="text" id="buscaInventario" class="busca" placeholder="Buscar item..."
            oninput="filtrarInventario()">

        <div id="listaInventario" class="lista"></div>

    </div>

    <script>
        const API_BASE = window.location.origin;
        const params = new URLSearchParams(window.location.search);
        const personagemId = Number(params.get("id"));

        let inventarioBaseId = null;
        let inventarioAtual = null;

        function voltarFicha() {
            window.location.href = `personagem-ficha.html?id=${personagemId}`;
        }

        async function carregarInventarioBase() {
            try {
                const resposta = await fetch(`${API_BASE}/inventario/base/personagem/${personagemId}`);

                if (!resposta.ok) return;

                const data = await resposta.json();
                inventarioBaseId = data.id ?? data.inventarioId;
            } catch (e) {
                console.warn("Inventário base não carregado (ok)");
            }
        }

        async function carregarInventario() {
            const lista = document.getElementById("listaInventario");

            try {
                const resposta = await fetch(`${API_BASE}/inventario/completo/personagem/${personagemId}`);

                if (!resposta.ok) {
                    throw new Error("Erro ao carregar inventário.");
                }

                const data = await resposta.json();
                inventarioAtual = data;
                renderInventario(data);

            } catch (erro) {
                console.error(erro);
                lista.innerHTML = `<div class="vazio">Erro ao carregar inventário</div>`;
            }
        }

        function renderInventario(data) {
            const lista = document.getElementById("listaInventario");

            let html = "";

            if (data.itens && data.itens.length) {
                html += `
                    <section class="secao-inventario">
                        <h3 class="titulo-secao">Itens</h3>
                        <div class="grupo-linhas">
                `;

                data.itens.forEach(reg => {
                    const nome = reg.item?.itemNome || "Item";
                    const itemId = reg.item?.id || reg.itemId;
                    const quantidade = reg.inventarioQuantidade ?? 1;

                    html += `
                        <div class="linha">
                            <div class="info">
                                <div class="info-nome">${nome}</div>
                                <div class="info-detalhe">Quantidade: ${quantidade}</div>
                            </div>
                            <button class="botao-remover" onclick="removerItem(${reg.id}, ${itemId})">
                                Remover
                            </button>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </section>
                `;
            }

            if (data.armas && data.armas.length) {
                html += `
                    <section class="secao-inventario">
                        <h3 class="titulo-secao">Armas</h3>
                        <div class="grupo-linhas">
                `;

                data.armas.forEach(arma => {
                    const nome = arma.armaNome || "Arma";
                    const qtdDado = arma.armaQuantidadeDado ?? "";
                    const tipoDado = arma.armaTipoDado ?? "";
                    const dano = (qtdDado && tipoDado) ? `${qtdDado}${tipoDado}` : null;

                    html += `
                        <div class="linha">
                            <div class="info">
                                <div class="info-nome">${nome}</div>
                                <div class="info-detalhe">${dano ? `Dano: ${dano}` : "Arma equipada no inventário"}</div>
                            </div>
                            <button class="botao-remover" onclick="removerArma(${arma.id})">
                                Remover
                            </button>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </section>
                `;
            }

            if (data.armaduras && data.armaduras.length) {
                html += `
                    <section class="secao-inventario">
                        <h3 class="titulo-secao">Armaduras</h3>
                        <div class="grupo-linhas">
                `;

                data.armaduras.forEach(armadura => {
                    const nome = armadura.armaduraNome || "Armadura";
                    const defesa = armadura.armaduraBonusDefesa ?? armadura.armaduraDefesa ?? 0;
                    const tipo = armadura.armaduraTipo || "Tipo não informado";

                    html += `
                        <div class="linha">
                            <div class="info">
                                <div class="info-nome">${nome}</div>
                                <div class="info-detalhe">Tipo: ${tipo} • Defesa: ${defesa}</div>
                            </div>
                            <button class="botao-remover" onclick="removerArmadura(${armadura.id})">
                                Remover
                            </button>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </section>
                `;
            }

            if (!html) {
                html = `<div class="vazio">Inventário vazio</div>`;
            }

            lista.innerHTML = html;
        }

        function filtrarInventario() {
            const termo = document.getElementById("buscaInventario").value.toLowerCase();

            if (!inventarioAtual) return;

            const filtrado = {
                itens: inventarioAtual.itens?.filter(i =>
                    (i.item?.itemNome || "").toLowerCase().includes(termo)
                ),
                armas: inventarioAtual.armas?.filter(a =>
                    (a.armaNome || "").toLowerCase().includes(termo)
                ),
                armaduras: inventarioAtual.armaduras?.filter(a =>
                    (a.armaduraNome || "").toLowerCase().includes(termo)
                )
            };

            renderInventario(filtrado);
        }

        async function removerItem(inventarioId, itemId) {
            try {
                const resposta = await fetch(`${API_BASE}/inventario/${inventarioId}/item/${itemId}?quantidade=1`, {
                    method: "DELETE"
                });

                if (!resposta.ok) {
                    throw new Error("Erro ao remover item.");
                }

                await carregarInventario();
            } catch (erro) {
                console.error("Erro ao remover item:", erro);
                alert("Erro ao remover item.");
            }
        }

        async function removerArma(armaId) {
            try {
                const resposta = await fetch(`${API_BASE}/arma/${armaId}/remover-inventario`, {
                    method: "PATCH"
                });

                if (!resposta.ok) {
                    throw new Error("Erro ao remover arma.");
                }

                await carregarInventario();
            } catch (erro) {
                console.error("Erro ao remover arma:", erro);
                alert("Erro ao remover arma.");
            }
        }

        async function removerArmadura(armaduraId) {
            try {
                const resposta = await fetch(`${API_BASE}/armadura/${armaduraId}/remover-inventario`, {
                    method: "PATCH"
                });

                if (!resposta.ok) {
                    throw new Error("Erro ao remover armadura.");
                }

                await carregarInventario();
            } catch (erro) {
                console.error("Erro ao remover armadura:", erro);
                alert("Erro ao remover armadura.");
            }
        }

        async function inicializarTela() {
            await carregarInventario();
            await carregarInventarioBase();
        }

        inicializarTela();
    </script>

</body>

</html>
