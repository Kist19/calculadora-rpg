<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário</title>

        <style>
        * { box-sizing: border-box; }
        :root {
            --bg:#05101d; --panel:#112033; --panel-soft:#17283d; --line:#243b5a; --line-strong:#2f4a70;
            --text:#f4f7fb; --muted:#aac0dd; --accent:#e0c27a; --accent-strong:#f0d595; --accent-text:#111827;
            --shadow:0 14px 38px rgba(0,0,0,.28);
        }
        html, body {
            margin:0; height:100%; font-family:Arial,sans-serif; background: radial-gradient(circle at top, #0a1a2c 0%, var(--bg) 58%); color:var(--text); overflow:hidden;
        }
        body { display:flex; justify-content:center; }
        .app {
            width:100%; max-width:430px; height:100vh; display:flex; flex-direction:column;
            background:linear-gradient(180deg, rgba(5,16,29,.98) 0%, rgba(4,13,24,.98) 100%);
            border-left:1px solid rgba(47,74,112,.32); border-right:1px solid rgba(47,74,112,.32);
        }
        .conteudo { flex:1; min-height:0; overflow:hidden; padding:10px; display:flex; flex-direction:column; gap:8px; }
        .card { background:linear-gradient(180deg, rgba(18,32,51,.98) 0%, rgba(21,36,56,.98) 100%); border:1px solid var(--line); border-radius:16px; padding:12px; box-shadow:var(--shadow); }
        .nome { font-size:19px; font-weight:800; color:var(--accent-strong); }
        .sub { font-size:13px; color:var(--muted); margin-top:4px; }
        .resumo { display:flex; justify-content:space-between; gap:14px; align-items:center; font-size:14px; }
        .lista-card { flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column; }
        .lista { flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
        .lista::-webkit-scrollbar { width:6px; } .lista::-webkit-scrollbar-thumb { background:rgba(170,192,221,.22); border-radius:999px; }
        .grupo { display:flex; flex-direction:column; gap:6px; }
        .grupo strong { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
        .item { display:flex; justify-content:space-between; gap:12px; padding:10px; border:1px solid var(--line); border-radius:12px; background:rgba(255,255,255,.04); font-size:14px; }
        .item span { font-weight:800; white-space:nowrap; }
        .vazio { font-size:14px; color:var(--muted); line-height:1.5; }
        .barra-acoes { padding:4px 10px 8px; flex-shrink:0; }
        .botao {
            width:100%; border:none; border-radius:16px; min-height:50px; padding:12px 12px;
            background:linear-gradient(180deg, var(--accent-strong) 0%, var(--accent) 100%); color:var(--accent-text);
            font-weight:800; font-size:14px; cursor:pointer;
        }
        .menu-inferior { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; padding:8px 10px 12px; flex-shrink:0; }
        .menu-inferior button {
            width:100%; min-width:0; min-height:48px; border-radius:15px; border:1px solid var(--line);
            background:var(--panel-soft); color:var(--text); padding:10px 4px; font-size:13px; font-weight:800; cursor:pointer;
        }
        .menu-inferior .ativo { background:linear-gradient(180deg, var(--accent-strong) 0%, var(--accent) 100%); color:var(--accent-text); }
    </style>
</head>

<body>
    <div class="app">
        <main class="conteudo">
            <div class="card">
                <div id="nome" class="nome">Carregando...</div>
                <div class="sub">Inventário do personagem</div>
            </div>

            <div class="card resumo">
                <div id="totalItens">Itens: -</div>
                <div id="peso">Espaço: -</div>
            </div>

            <div class="card lista-card">
                <div class="lista" id="listaItens"></div>
            </div>
        </main>

        <section class="barra-acoes">
            <button class="botao" onclick="carregar()">Atualizar inventário</button>
        </section>

        <div class="menu-inferior">
            <button onclick="ir('loja')">Loja</button>
            <button class="ativo">Inventário</button>
            <button onclick="ir('dados')">Dados</button>
            <button onclick="ir('personagem')">Personagem</button>
        </div>
    </div>

    <script>
        const API = "http://localhost:8080";
        const id = new URLSearchParams(location.search).get("id");

        let personagemAtual = null;
        let itemSelecionado = null;
        let acaoEmExecucao = false;

        function ir(tela) {
            location.href = `${tela}.html?id=${id}`;
        }

        function mostrarMensagem(texto, tipo = "sucesso") {
            let msg = document.getElementById("mensagem");

            if (!msg) {
                msg = document.createElement("div");
                msg.id = "mensagem";
                msg.style.marginBottom = "8px";
                msg.style.padding = "10px 12px";
                msg.style.borderRadius = "12px";
                msg.style.fontSize = "13px";
                msg.style.fontWeight = "bold";
                msg.style.border = "1px solid transparent";

                const conteudo = document.querySelector(".conteudo");
                conteudo.insertBefore(msg, conteudo.firstChild);
            }

            if (tipo === "erro") {
                msg.style.background = "rgba(103,31,31,.95)";
                msg.style.color = "#fff0f0";
                msg.style.borderColor = "rgba(240,139,139,.38)";
            } else {
                msg.style.background = "rgba(31,77,56,.95)";
                msg.style.color = "#e8fff1";
                msg.style.borderColor = "rgba(121,215,164,.4)";
            }

            msg.textContent = texto;

            clearTimeout(msg._timer);
            msg._timer = setTimeout(() => {
                msg.remove();
            }, 3000);
        }

        function formatarNumero(valor) {
            if (valor === null || valor === undefined || valor === "") return "-";
            const numero = Number(valor);
            if (Number.isNaN(numero)) return String(valor);
            return Number.isInteger(numero) ? String(numero) : numero.toFixed(1).replace(".", ",");
        }

        function formatarTexto(valor) {
            if (valor === null || valor === undefined || valor === "") return "-";
            return String(valor).replace(/_/g, " ");
        }

        function formatarSinal(valor) {
            const numero = Number(valor || 0);
            if (numero > 0) return `+${numero}`;
            if (numero < 0) return `${numero}`;
            return "0";
        }

        function formatarMoeda(valor) {
            if (valor === null || valor === undefined || valor === "") return "0 PP";
            const numero = Number(valor);
            if (Number.isNaN(numero)) return `${valor} PP`;
            return `${formatarNumero(numero)} PP`;
        }

        function garantirModal() {
            if (document.getElementById("modalOverlay")) return;

            const modal = document.createElement("div");
            modal.id = "modalOverlay";
            modal.style.position = "fixed";
            modal.style.inset = "0";
            modal.style.background = "rgba(3, 8, 15, 0.72)";
            modal.style.display = "none";
            modal.style.alignItems = "center";
            modal.style.justifyContent = "center";
            modal.style.padding = "16px";
            modal.style.zIndex = "999";

            modal.innerHTML = `
            <div id="modalCaixa" style="
                width: 100%;
                max-width: 390px;
                background: linear-gradient(180deg, rgba(18,32,51,.98) 0%, rgba(21,36,56,.98) 100%);
                border-radius: 16px;
                border: 1px solid #243b5a;
                box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
                overflow: hidden;
            ">
                <div style="
                    display:flex;
                    justify-content:space-between;
                    gap:12px;
                    padding:16px 16px 10px;
                    border-bottom:1px solid #243b5a;
                ">
                    <div style="min-width:0;">
                        <div id="modalTitulo" style="font-size:18px;font-weight:bold;line-height:1.2;word-break:break-word;">Detalhes</div>
                        <div id="modalSubtitulo" style="margin-top:4px;font-size:12px;color:#aac0dd;text-transform:uppercase;letter-spacing:.04em;">Tipo</div>
                    </div>
                    <button onclick="fecharModal()" style="
                        border:none;
                        background:rgba(255,255,255,.06);
                        color:#f4f7fb;
                        width:34px;
                        height:34px;
                        border-radius:10px;
                        font-size:18px;
                        font-weight:bold;
                        cursor:pointer;
                        flex-shrink:0;
                    ">×</button>
                </div>

                <div id="modalConteudo" style="
                    padding:14px 16px;
                    display:flex;
                    flex-direction:column;
                    gap:10px;
                    max-height:60vh;
                    overflow-y:auto;
                "></div>

                <div style="
                    display:flex;
                    gap:8px;
                    padding:14px 16px 16px;
                    border-top:1px solid #243b5a;
                ">
                    <button id="modalCancelar" onclick="fecharModal()" style="
                        flex:1;
                        border:none;
                        border-radius:12px;
                        padding:13px;
                        font-weight:bold;
                        cursor:pointer;
                        font-size:14px;
                        background:#cfd4dc;
                        color:#111827;
                    ">Fechar</button>

                    <button id="modalAcao" onclick="executarAcaoModal()" style="
                        flex:1;
                        border:none;
                        border-radius:12px;
                        padding:13px;
                        font-weight:bold;
                        cursor:pointer;
                        font-size:14px;
                        background:linear-gradient(180deg, #f0d595 0%, #e0c27a 100%);
                        color:#111827;
                    ">Ação</button>
                </div>
            </div>
        `;

            modal.addEventListener("click", function (e) {
                if (e.target.id === "modalOverlay") {
                    fecharModal();
                }
            });

            document.body.appendChild(modal);
        }

        function linhaDetalhe(rotulo, valor) {
            return `
            <div style="display:grid;grid-template-columns:120px 1fr;gap:10px;align-items:start;font-size:14px;">
                <strong style="color:#aac0dd;font-weight:normal;">${rotulo}</strong>
                <span style="font-weight:bold;word-break:break-word;color:#f4f7fb;">${valor}</span>
            </div>
        `;
        }

        function caixaBonus(titulo, linhas) {
            const validas = linhas.filter(Boolean);
            if (!validas.length) return "";

            return `
            <div style="background:rgba(255,255,255,.04);border:1px solid #243b5a;border-radius:12px;padding:12px;">
                <div style="font-size:12px;color:#aac0dd;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;font-weight:bold;">
                    ${titulo}
                </div>
                <div style="display:flex;flex-direction:column;gap:6px;font-size:14px;">
                    ${validas.join("")}
                </div>
            </div>
        `;
        }

        function linhaBonus(rotulo, valor) {
            return `
            <div style="display:flex;justify-content:space-between;gap:12px;">
                <span style="color:#6b7280;">${rotulo}</span>
                <strong>${valor}</strong>
            </div>
        `;
        }

        function abrirModal(item) {
            garantirModal();
            itemSelecionado = item;

            document.getElementById("modalTitulo").textContent = item.nome || "Detalhes";
            document.getElementById("modalSubtitulo").textContent = formatarTexto(item.categoria || "item");

            const conteudo = document.getElementById("modalConteudo");
            const botao = document.getElementById("modalAcao");

            let html = "";

            if (item.categoria === "item") {
                const infos = [];

                html += linhaDetalhe("Tipo", formatarTexto(item.tipo));
                html += linhaDetalhe("Quantidade", item.qtd ?? 1);
                html += linhaDetalhe("Espaço", formatarNumero(item.espaco));
                html += linhaDetalhe("Valor", formatarMoeda(item.valor));
                html += linhaDetalhe("Duração", `${formatarNumero(item.duracao)} turno(s)`);

                if (item.efeitoNome) {
                    html += linhaDetalhe("Efeito", item.efeitoNome);
                }

                if ((item.bonusAtaque || 0) !== 0 || (item.penalidadeAtaque || 0) !== 0) {
                    infos.push(linhaBonus(
                        "Ataque",
                        `${formatarSinal((item.bonusAtaque || 0) - (item.penalidadeAtaque || 0))}`
                    ));
                }

                if ((item.bonusDano || 0) !== 0 || (item.penalidadeDano || 0) !== 0) {
                    infos.push(linhaBonus(
                        "Dano",
                        `${formatarSinal((item.bonusDano || 0) - (item.penalidadeDano || 0))}`
                    ));
                }

                if ((item.bonusPv || 0) !== 0 || (item.penalidadePv || 0) !== 0) {
                    infos.push(linhaBonus(
                        "PV",
                        `${formatarSinal((item.bonusPv || 0) - (item.penalidadePv || 0))}`
                    ));
                }

                if ((item.bonusPm || 0) !== 0 || (item.penalidadePm || 0) !== 0) {
                    infos.push(linhaBonus(
                        "PM",
                        `${formatarSinal((item.bonusPm || 0) - (item.penalidadePm || 0))}`
                    ));
                }

                if (item.quantidadeDado && item.tipoDado && item.dadoTipoAcao) {
                    infos.push(linhaBonus(
                        item.dadoTipoAcao === "CURA" ? "Cura" : "Dano",
                        `${item.quantidadeDado}d${String(item.tipoDado).replace(/^D/i, "")}`
                    ));
                }

                if (infos.length > 0) {
                    html += caixaBonus("Efeitos do item", infos);
                }

                botao.textContent = "Usar";
                botao.style.display = "block";
            }

            if (item.categoria === "arma") {
                const danoBase = item.tipoDado
                    ? `${item.quantidadeDado || 1}d${String(item.tipoDado).replace("D", "")}`
                    : "-";

                html += linhaDetalhe("Tipo", formatarTexto(item.tipo));
                html += linhaDetalhe("Perícia", formatarTexto(item.pericia));
                html += linhaDetalhe("Teste de ataque", item.testeAtaque || "-");
                html += linhaDetalhe("Dano base", danoBase);
                html += linhaDetalhe("Crítico", `x${item.criticoMultiplicador || "-"} / ${item.criticoMinimo || "-"}`);
                html += linhaDetalhe("Alcance", formatarTexto(item.alcance));
                html += linhaDetalhe("Espaço", formatarNumero(item.espaco));
                html += linhaDetalhe("Valor", formatarMoeda(item.valor));
                html += linhaDetalhe("Status", item.equipado ? "Equipada" : "Não equipada");

                botao.textContent = item.equipado ? "Desequipar" : "Equipar";
                botao.style.display = "block";
            }

            if (item.categoria === "armadura" || item.categoria === "escudo") {
                html += linhaDetalhe("Tipo", formatarTexto(item.tipo));
                html += linhaDetalhe("Defesa", formatarSinal(item.bonusDefesa));
                html += linhaDetalhe("Penalidade", formatarSinal(-item.penalidadeArmadura));
                html += linhaDetalhe("Espaço", formatarNumero(item.espaco));
                html += linhaDetalhe("Valor", formatarMoeda(item.valor));
                html += linhaDetalhe("Status", item.equipado ? "Equipado" : "Não equipado");

                botao.textContent = item.equipado ? "Desequipar" : "Equipar";
                botao.style.display = "block";
            }

            conteudo.innerHTML = html;
            document.getElementById("modalOverlay").style.display = "flex";
        }

        function fecharModal() {
            const overlay = document.getElementById("modalOverlay");
            if (overlay) overlay.style.display = "none";
            itemSelecionado = null;
            acaoEmExecucao = false;
            atualizarEstadoBotoesModal();
        }

        function atualizarEstadoBotoesModal() {
            const botaoAcao = document.getElementById("modalAcao");
            const botaoCancelar = document.getElementById("modalCancelar");

            if (botaoAcao) botaoAcao.disabled = acaoEmExecucao;
            if (botaoCancelar) botaoCancelar.disabled = acaoEmExecucao;
        }

        async function usarItem(item) {
            const resposta = await fetch(`${API}/inventario/${item.inventarioId}/usar`, {
                method: "POST"
            });

            if (!resposta.ok) {
                let mensagem = "Não foi possível usar o item.";
                try {
                    mensagem = await resposta.text() || mensagem;
                } catch (_) { }
                throw new Error(mensagem);
            }
        }

        async function equiparArma(armaId) {
            const resposta = await fetch(`${API}/personagem/${id}/equipar-arma/${armaId}`, {
                method: "POST"
            });

            if (!resposta.ok) {
                let mensagem = "Não foi possível equipar a arma.";
                try {
                    mensagem = await resposta.text() || mensagem;
                } catch (_) { }
                throw new Error(mensagem);
            }
        }

        async function desequiparArma() {
            const resposta = await fetch(`${API}/personagem/${id}/desequipar-arma`, {
                method: "POST"
            });

            if (!resposta.ok) {
                let mensagem = "Não foi possível desequipar a arma.";
                try {
                    mensagem = await resposta.text() || mensagem;
                } catch (_) { }
                throw new Error(mensagem);
            }
        }

        async function equiparArmadura(armaduraId) {
            const resposta = await fetch(`${API}/personagem/${id}/equipar-armadura/${armaduraId}`, {
                method: "POST"
            });

            if (!resposta.ok) {
                let mensagem = "Não foi possível equipar a armadura.";
                try {
                    mensagem = await resposta.text() || mensagem;
                } catch (_) { }
                throw new Error(mensagem);
            }
        }

        async function desequiparArmadura() {
            const resposta = await fetch(`${API}/personagem/${id}/desequipar-armadura`, {
                method: "POST"
            });

            if (!resposta.ok) {
                let mensagem = "Não foi possível desequipar a armadura.";
                try {
                    mensagem = await resposta.text() || mensagem;
                } catch (_) { }
                throw new Error(mensagem);
            }
        }

        async function equiparEscudo(escudoId) {
            const resposta = await fetch(`${API}/personagem/${id}/equipar-escudo/${escudoId}`, {
                method: "POST"
            });

            if (!resposta.ok) {
                let mensagem = "Não foi possível equipar o escudo.";
                try {
                    mensagem = await resposta.text() || mensagem;
                } catch (_) { }
                throw new Error(mensagem);
            }
        }

        async function desequiparEscudo() {
            const resposta = await fetch(`${API}/personagem/${id}/desequipar-escudo`, {
                method: "POST"
            });

            if (!resposta.ok) {
                let mensagem = "Não foi possível desequipar o escudo.";
                try {
                    mensagem = await resposta.text() || mensagem;
                } catch (_) { }
                throw new Error(mensagem);
            }
        }

        async function executarAcaoModal() {
            if (!itemSelecionado || acaoEmExecucao) return;

            acaoEmExecucao = true;
            atualizarEstadoBotoesModal();

            try {
                if (itemSelecionado.categoria === "item") {
                    await usarItem(itemSelecionado);
                    mostrarMensagem(`${itemSelecionado.nome} usado com sucesso.`);
                }

                if (itemSelecionado.categoria === "arma") {
                    if (itemSelecionado.equipado) {
                        await desequiparArma();
                        mostrarMensagem(`${itemSelecionado.nome} desequipada com sucesso.`);
                    } else {
                        await equiparArma(itemSelecionado.id);
                        mostrarMensagem(`${itemSelecionado.nome} equipada com sucesso.`);
                    }
                }

                if (itemSelecionado.categoria === "armadura") {
                    if (itemSelecionado.equipado) {
                        await desequiparArmadura();
                        mostrarMensagem(`${itemSelecionado.nome} desequipada com sucesso.`);
                    } else {
                        await equiparArmadura(itemSelecionado.id);
                        mostrarMensagem(`${itemSelecionado.nome} equipada com sucesso.`);
                    }
                }

                if (itemSelecionado.categoria === "escudo") {
                    if (itemSelecionado.equipado) {
                        await desequiparEscudo();
                        mostrarMensagem(`${itemSelecionado.nome} desequipado com sucesso.`);
                    } else {
                        await equiparEscudo(itemSelecionado.id);
                        mostrarMensagem(`${itemSelecionado.nome} equipado com sucesso.`);
                    }
                }

                fecharModal();
                await carregar();

            } catch (erro) {
                console.error("Erro ao executar ação:", erro);
                mostrarMensagem(erro.message || "Erro ao executar ação.", "erro");
                acaoEmExecucao = false;
                atualizarEstadoBotoesModal();
            }
        }

        function criarCardInventario(dado) {
            const item = document.createElement("div");
            item.className = "item";
            item.style.cursor = "pointer";
            item.style.alignItems = "center";

            const status = dado.equipado
                ? `<div style="
                    font-size:11px;
                    font-weight:bold;
                    padding:4px 8px;
                    border-radius:999px;
                    background:#dbeafe;
                    color:#1d4ed8;
                    border:1px solid #93c5fd;
                    margin-bottom:4px;
                ">Equipado</div>`
                : "";

            const qtd = dado.categoria === "item" ? `x${dado.qtd ?? 1}` : "";

            item.innerHTML = `
            <div style="min-width:0;display:flex;flex-direction:column;gap:4px;">
                <div style="font-weight:bold;word-break:break-word;color:#f4f7fb;">${dado.nome}</div>
                <div style="font-size:12px;color:#6b7280;">
                    ${dado.meta || ""}
                </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;">
                ${status}
                <span>${qtd}</span>
            </div>
        `;

            item.onclick = () => abrirModal(dado);
            return item;
        }

        async function carregar() {
            try {
                const respostaPersonagens = await fetch(`${API}/personagem`);
                const personagens = await respostaPersonagens.json();
                personagemAtual = personagens.find(x => String(x.id) === String(id));

                document.getElementById("nome").innerText = personagemAtual?.personagemNome || "Personagem";

                const respostaInventario = await fetch(`${API}/inventario/completo/personagem/${id}`);

                if (!respostaInventario.ok) {
                    document.getElementById("listaItens").innerHTML =
                        `<div class="vazio">Não foi possível carregar o inventário.</div>`;
                    document.getElementById("totalItens").innerText = `Itens: 0`;
                    document.getElementById("peso").innerText = `Espaço: 0/20`;
                    return;
                }

                const inv = await respostaInventario.json();

                const itens = (inv.itens || []).map(i => ({
                    categoria: "item",
                    inventarioId: i.id,
                    id: i.item?.id,
                    nome: i.item?.itemNome || i.itemNome || "Item",
                    tipo: i.item?.itemTipo || i.itemTipo || "ITEM",
                    qtd: i.inventarioQuantidade || i.quantidade || 1,
                    espaco: i.item?.itemEspaco || i.itemEspaco || 0,
                    valor: i.item?.itemPreco || i.itemPreco || 0,

                    duracao: i.item?.itemDuracaoTurno ?? i.itemDuracaoTurno ?? 0,

                    quantidadeDado: i.item?.itemQuantidadeDado || 0,
                    tipoDado: i.item?.itemTipoDado || null,
                    dadoTipoAcao: i.item?.itemDadoTipoAcao || null,

                    bonusAtaque: i.item?.itemBonusAtaque || 0,
                    penalidadeAtaque: i.item?.itemPenalidadeAtaque || 0,
                    bonusDano: i.item?.itemBonusDano || 0,
                    penalidadeDano: i.item?.itemPenalidadeDano || 0,
                    bonusPv: i.item?.itemBonusPv || 0,
                    penalidadePv: i.item?.itemPenalidadePv || 0,
                    bonusPm: i.item?.itemBonusPm || 0,
                    penalidadePm: i.item?.itemPenalidadePm || 0,

                    efeitoNome: i.item?.efeito?.efeitoNome || null,
                    equipado: false,

                    meta: `Tipo: ${formatarTexto(i.item?.itemTipo || i.itemTipo || "ITEM")} • Espaço: ${formatarNumero(i.item?.itemEspaco || i.itemEspaco || 0)} • Duração: ${formatarNumero(i.item?.itemDuracaoTurno ?? i.itemDuracaoTurno ?? 0)}`
                }));

                const armas = (inv.armas || []).map(a => ({
                    categoria: "arma",
                    id: a.id,
                    nome: a.armaNome || "Arma",
                    tipo: a.armaTipo || "ARMA",
                    pericia: a.armaTipoPericia || "-",
                    testeAtaque: a.armaTesteAtaque || "1d20",
                    bonusAtaque: a.armaBonusTesteAtaque || 0,
                    penalidadeAtaque: a.armaPenalidadeTesteAtaque || 0,
                    quantidadeDado: a.armaQuantidadeDado || 1,
                    tipoDado: a.armaTipoDado || null,
                    bonusDano: a.armaBonusDano || 0,
                    penalidadeDano: a.armaPenalidadeDano || 0,
                    criticoMinimo: a.armaCriticoMinimo || "-",
                    criticoMultiplicador: a.armaCriticoMultiplicador || "-",
                    alcance: a.armaAlcance || "-",
                    espaco: a.armaEspaco || 0,
                    valor: a.armaPreco || 0,
                    equipado: personagemAtual?.armaEquipada?.id === a.id,
                    meta: `Tipo: ${formatarTexto(a.armaTipo || "ARMA")} • Alcance: ${formatarTexto(a.armaAlcance || "-")}`
                }));

                const armaduras = (inv.armaduras || []).map(a => {
                    const tipo = a.armaduraTipo || "ARMADURA";
                    const ehEscudo = tipo === "ESCUDO";
                    const equipado = ehEscudo
                        ? personagemAtual?.escudoEquipado?.id === a.id
                        : personagemAtual?.armaduraEquipada?.id === a.id;

                    return {
                        categoria: ehEscudo ? "escudo" : "armadura",
                        id: a.id,
                        nome: a.armaduraNome || "Armadura",
                        tipo,
                        bonusDefesa: a.armaduraBonusDefesa || 0,
                        penalidadeArmadura: a.armaduraPenalidadeArmadura || 0,
                        espaco: a.armaduraEspaco || 0,
                        valor: a.armaduraPreco || 0,
                        equipado,
                        meta: `Tipo: ${formatarTexto(tipo)} • Defesa: ${formatarSinal(a.armaduraBonusDefesa || 0)}`
                    };
                });

                const container = document.getElementById("listaItens");
                container.innerHTML = "";

                function criarGrupo(titulo, lista) {
                    if (!lista.length) return;

                    const div = document.createElement("div");
                    div.className = "grupo";

                    const tituloEl = document.createElement("strong");
                    tituloEl.textContent = titulo;
                    div.appendChild(tituloEl);

                    lista.forEach(dado => {
                        div.appendChild(criarCardInventario(dado));
                    });

                    container.appendChild(div);
                }

                criarGrupo("Armas", armas);
                criarGrupo("Armaduras", armaduras);
                criarGrupo("Itens", itens);

                if (!container.innerHTML.trim()) {
                    container.innerHTML = `<div class="vazio">Nenhum item no inventário.</div>`;
                }

                const totalItens = itens.reduce((acc, item) => acc + (item.qtd || 0), 0);
                const totalArmas = armas.length;
                const totalArmaduras = armaduras.length;
                const totalGeral = totalItens + totalArmas + totalArmaduras;

                document.getElementById("totalItens").innerText = `Itens: ${totalGeral}`;

                const espacoItens = (inv.itens || []).reduce((acc, i) => {
                    const espaco = i.item?.itemEspaco || i.itemEspaco || 0;
                    const qtd = i.inventarioQuantidade || i.quantidade || 1;
                    return acc + (Number(espaco) * Number(qtd));
                }, 0);

                const espacoArmas = (inv.armas || []).reduce((acc, a) => {
                    return acc + Number(a.armaEspaco || 0);
                }, 0);

                const espacoArmaduras = (inv.armaduras || []).reduce((acc, a) => {
                    return acc + Number(a.armaduraEspaco || 0);
                }, 0);

                const espacoTotal = espacoItens + espacoArmas + espacoArmaduras;
                document.getElementById("peso").innerText = `Espaço: ${formatarNumero(espacoTotal)}/20`;

            } catch (erro) {
                console.error("Erro ao carregar inventário:", erro);
                document.getElementById("listaItens").innerHTML =
                    `<div class="vazio">Erro ao carregar o inventário.</div>`;
                document.getElementById("totalItens").innerText = `Itens: 0`;
                document.getElementById("peso").innerText = `Espaço: 0/20`;
                mostrarMensagem("Erro ao carregar o inventário.", "erro");
            }
        }

        carregar();
    </script>
</body>

</html>
